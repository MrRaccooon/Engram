capture:
  # How often the screenshot collector fires (seconds)
  screenshot_interval_seconds: 30
  # How often the clipboard collector polls for changes (seconds)
  clipboard_poll_seconds: 2
  # Global hotkey to trigger an immediate manual capture
  manual_hotkey: "ctrl+shift+m"
  # Apps to never capture (process name, case-insensitive)
  excluded_apps:
    - "1password.exe"
    - "keepass.exe"
    - "bitwarden.exe"
    - "kwallet.exe"
  # Browser domains to exclude from history indexing (supports wildcards)
  excluded_domains:
    - "bankofamerica.com"
    - "chase.com"
    - "*.gov"
    - "localhost"
  # Suppress captures when an incognito/private browser window is active
  suppress_incognito: true
  # Directories to watch for document open/edit events
  watched_directories:
    - "~/Documents"
    - "~/Desktop"
    - "~/Downloads"
  # File extensions to index from filesystem watcher
  watched_extensions:
    - ".txt"
    - ".md"
    - ".pdf"
    - ".docx"
    - ".py"
    - ".js"
    - ".ts"
    - ".log"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".csv"

storage:
  # Root path for all Engram data (thumbnails, raw files, DBs)
  base_path: "~/.engram"
  # Keep raw full-resolution screenshots after OCR and embedding
  # Set false to save ~10x storage (thumbnails kept regardless)
  keep_raw_screenshots: false
  # Thumbnail max dimension in pixels (longest side)
  # 1024px balances disk size (~50KB) with OCR readability
  thumbnail_size: 1024
  # Delete captures older than this many days (0 = keep forever)
  retention_days: 90
  # Auto-cleanup when storage exceeds this limit (GB). 0 = disabled.
  max_storage_gb: 10

embedding:
  # sentence-transformers model for text embedding
  text_model: "all-MiniLM-L6-v2"
  # CLIP model for visual embedding (open-clip-torch)
  visual_model: "ViT-L-14"
  visual_pretrained: "openai"
  # Cross-encoder model for reranking retrieved results
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  # Number of items to embed in a single batch
  batch_size: 16
  # How often the cold-path worker processes the job queue (minutes)
  worker_interval_minutes: 1
  # Top-K candidates retrieved from vector DB before reranking
  retrieval_top_k: 50
  # Final top-N results returned to the frontend after reranking
  result_top_n: 10

chunking:
  # Maximum tokens per chunk fed to the text embedder
  chunk_size: 512
  # Token overlap between consecutive chunks
  chunk_overlap: 64

api:
  host: "127.0.0.1"
  port: 8765
  # How many seconds to cache /status responses
  status_cache_seconds: 5

privacy:
  # Encrypt the ChromaDB and SQLite data at rest using Fernet/AES-256
  encrypt_at_rest: false
  # Require a local PIN before the dashboard loads
  require_local_auth: false
  # Log every search query and data access event to audit.log
  audit_logging: true

intelligence:
  # API provider: openrouter | anthropic | openai | disabled
  # openrouter is recommended — one key, cheapest rates, all models
  api_provider: "openrouter"

  # ── Cheapest vision-capable models ───────────────────────────────────────
  # OpenRouter (api_provider: "openrouter") — uses OPENROUTER_API_KEY:
  #   api_model:      "google/gemini-2.0-flash-lite"  ~$0.075/MTok in  vision
  #   api_model_deep: "google/gemini-2.0-flash"       ~$0.10/MTok in   vision
  #   (even cheaper:  "google/gemini-flash-1.5-8b"    ~$0.0375/MTok in)
  #
  # OpenAI direct (api_provider: "openai") — uses OPENAI_API_KEY:
  #   api_model:      "gpt-4o-mini"                   ~$0.15/MTok in   vision
  #
  # Anthropic direct (api_provider: "anthropic") — uses ANTHROPIC_API_KEY:
  #   api_model:      "claude-3-haiku-20240307"        ~$0.25/MTok in   vision
  #   api_model_deep: "claude-3-5-haiku-20241022"      ~$0.80/MTok in   vision
  # ─────────────────────────────────────────────────────────────────────────
  api_model: "openai/gpt-4o-mini"
  api_model_deep: "openai/gpt-4o-mini"

  # Local Ollama model for pre-summarization before API call (set "" to skip)
  local_summarizer: ""
  # Chunks with sensitivity score >= this threshold are blocked from the API
  sensitivity_threshold: 0.65
  # Maximum tokens of context to send per API call
  max_context_tokens: 2000
  # Show user a preview of what will be sent before making the API call
  confirm_before_send: true

consolidation:
  # Time to run the nightly consolidation worker (24h format)
  run_hour: 2
  run_minute: 0
  # Session gap in minutes — captures this far apart start a new session
  session_gap_minutes: 30

concept_vocabulary:
  # Minimum CLIP similarity for a concept to match a screenshot
  match_threshold: 0.15
  # Max concepts returned per screenshot
  top_k_per_screenshot: 8
  # Relevance decay factor applied daily (concepts fade without matches)
  relevance_decay_factor: 0.98
  # Concepts below this relevance become dormant (can revive)
  dormant_threshold: 0.05
  # Probation: minimum matches to promote a learned concept
  probation_min_matches: 3
  # Probation: minimum average confidence to promote
  probation_min_confidence: 0.18
  # Probation: days before an unmatched concept is demoted to dormant
  probation_max_days: 7
  # Auto-merge: cosine threshold for treating two concepts as duplicates
  merge_similarity_threshold: 0.95
  # Flag concepts matching more than this fraction of screenshots
  broad_concept_threshold: 0.4
  # Harvest cycle interval in hours
  harvest_interval_hours: 6
  # OCR noun harvester: minimum occurrences before creating a concept
  ocr_noun_min_occurrences: 5

diff_analysis:
  # Pixel-level change threshold for cv2.absdiff binary mask (0-255)
  pixel_threshold: 30
  # Comparison resolution (both dimensions)
  resize_dim: 512
  # Minimum contour area (in resized pixels) to count as a change region
  min_contour_area: 50
  # Change magnitude thresholds for activity classification
  idle_threshold: 0.02
  app_switch_threshold: 0.7

mcp:
  # Expose Engram as an MCP tool server for Claude Desktop / Cursor / etc.
  enabled: false
  host: "127.0.0.1"
  port: 8766
